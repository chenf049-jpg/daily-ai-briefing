name: 每日AI日报

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 运行数据采集
        run: python scripts/fetch_data.py
        env:
          PYTHONIOENCODING: utf-8

      - name: 提交数据到仓库
        run: |
          git config user.name "daily-ai-bot"
          git config user.email "bot@daily-ai"
          git add public/briefing.json
          git diff --quiet && git diff --staged --quiet || git commit -m "每日AI日报 $(date +'%Y-%m-%d')"
          git push
